name: Generate Snake
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
4. Click **"Commit changes"** → **"Commit directly to main"** → **Commit**

---

### Step 3 — Allow GitHub Actions permissions
1. In your repo → click **Settings** tab
2. Left sidebar → **Actions** → **General**
3. Under **"Workflow permissions"** → select **"Read and write permissions"**
4. Click **Save**

---

### Step 4 — Run it manually (first time)
1. Click the **Actions** tab in your repo
2. You'll see **"Generate Snake"** in the left list
3. Click it → click **"Run workflow"** button → **"Run workflow"** (green button)
4. Wait ~30 seconds for it to complete ✅

---

### Step 5 — Verify it worked
Go to your repo and check if a branch called **`output`** was created. Inside it you should see:
```
github-contribution-grid-snake.svg
github-contribution-grid-snake-dark.svg
